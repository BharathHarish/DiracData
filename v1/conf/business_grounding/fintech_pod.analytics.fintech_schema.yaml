version: 1
scope:
  catalog: fintech_pod
  database: analytics
  schema: fintech_schema
glossary:
- id: active_user
  term: Active user
  synonyms:
  - active merchant
  - active account
  - active payer
  definition: A user who has done at least one successful payment in the calendar
    month.
  tables:
  - payments
  columns:
  - payments.user_ref
  - payments.payment_time
  - payments.payment_status
- id: dau
  term: DAU
  synonyms:
  - daily active users
  - daily transacting users
  definition: A user who has done at least one successful payment on that calendar
    day.
  tables:
  - payments
  columns:
  - payments.user_ref
  - payments.payment_time
  - payments.payment_status
- id: mau
  term: MAU
  synonyms:
  - monthly active users
  - monthly transacting users
  definition: A user who has completed at least three successful payments in the calendar
    month.
  tables:
  - payments
  columns:
  - payments.user_ref
  - payments.payment_time
  - payments.payment_status
- id: retained_user
  term: Retained user
  synonyms:
  - retained merchant
  - repeat transacting user
  definition: A user with at least 10 successful transactions in the past 3 months
    and at least one successful transaction in every month of that window.
  tables:
  - payments
  columns:
  - payments.user_ref
  - payments.payment_time
  - payments.payment_status
- id: churned_user
  term: Churned user
  synonyms:
  - lapsed user
  - inactive user
  definition: A user who has not done any successful payment in the past 15 days.
  tables:
  - payments
  columns:
  - payments.user_ref
  - payments.payment_time
  - payments.payment_status
definitions:
- id: successful_payment
  name: Successful payment
  definition: A payment attempt whose payment_status is SUCCESS.
  tables:
  - payments
  columns:
  - payments.payment_status
- id: payment_rail
  name: Payment rail
  synonyms:
  - payment method
  - rail
  - route
  - UPI
  - CC
  - NEFT
  - IMPS
  definition: The payment network or method used for a transaction, resolved through
    payments.rail_ref to payment_attributes.rail_ref.
  tables:
  - payments
  - payment_attributes
  columns:
  - payments.rail_ref
  - payment_attributes.rail_ref
  - payment_attributes.rail_type
defaults:
- id: metrics_use_successful_payments
  applies_to:
  - TPV
  - active users
  - DAU
  - MAU
  - retained users
  - churned users
  policy: Use payment_status = 'SUCCESS' unless the user explicitly asks for all payment
    attempts.
  field: payments.payment_status
- id: calendar_month_from_payment_time
  applies_to:
  - calendar month
  - monthly
  - MAU
  - retention
  policy: Use date_trunc('month', payments.payment_time) for calendar-month grouping.
  field: payments.payment_time
- id: rail_slice_uses_payment_attributes
  applies_to:
  - UPI
  - credit card
  - CC
  - NEFT
  - IMPS
  - payment rail
  policy: Join payments to payment_attributes on rail_ref and slice by payment_attributes.rail_type.
  field: payment_attributes.rail_type
metrics:
- id: tpv
  name: TPV
  synonyms:
  - total payment volume
  - payment volume
  - transaction volume
  description: Total payment volume is the sum of successful payment amounts for the
    requested period or slice.
  calculation: SUM(payments.amount) where payments.payment_status = 'SUCCESS'
  parameterized_sql:
    description: Canonical governed SQL for TPV. Bind the parameters instead of
      rewriting the metric definition.
    parameters:
    - name: start_time
      type: timestamp
      required: true
      description: Inclusive lower bound on payments.payment_time.
    - name: end_time
      type: timestamp
      required: true
      description: Exclusive upper bound on payments.payment_time.
    sql: |
      SELECT
        SUM(CASE WHEN p.payment_status = 'SUCCESS' THEN p.amount ELSE 0 END) AS tpv
      FROM payments p
      WHERE p.payment_time >= {{ start_time }}
        AND p.payment_time < {{ end_time }}
    result_columns:
    - name: tpv
      semantic_type: metric
      description: Sum of successful payment amounts in the requested time window.
    required_tables:
    - payments
    required_columns:
    - payments.amount
    - payments.payment_status
    - payments.payment_time
    sql_contract:
      aggregate: sum
      measure: payments.amount
      condition:
        column: payments.payment_status
        operator: "="
        value: SUCCESS
      time_column: payments.payment_time
  tables:
  - payments
  columns:
  - payments.amount
  - payments.payment_status
  - payments.payment_time
- id: psr
  name: PSR
  synonyms:
  - payment success rate
  - success rate
  description: Payment success rate is successful payment attempts divided by total
    payment attempts in the requested period.
  calculation: COUNT_IF(payment_status = 'SUCCESS') / COUNT(*)
  parameterized_sql:
    description: Canonical governed SQL for payment success rate. Bind the parameters
      instead of rewriting the metric definition.
    parameters:
    - name: start_time
      type: timestamp
      required: true
      description: Inclusive lower bound on payments.payment_time.
    - name: end_time
      type: timestamp
      required: true
      description: Exclusive upper bound on payments.payment_time.
    sql: |
      SELECT
        SUM(CASE WHEN p.payment_status = 'SUCCESS' THEN 1 ELSE 0 END) AS successful_payments,
        COUNT(*) AS total_payments,
        SUM(CASE WHEN p.payment_status = 'SUCCESS' THEN 1 ELSE 0 END)::DOUBLE / NULLIF(COUNT(*), 0) AS psr
      FROM payments p
      WHERE p.payment_time >= {{ start_time }}
        AND p.payment_time < {{ end_time }}
    result_columns:
    - name: successful_payments
      semantic_type: numerator
      description: Number of successful payment attempts in the requested time window.
    - name: total_payments
      semantic_type: denominator
      description: Number of all payment attempts in the requested time window.
    - name: psr
      semantic_type: metric
      description: Successful payment attempts divided by all payment attempts.
    required_tables:
    - payments
    required_columns:
    - payments.payment_status
    - payments.payment_time
    sql_contract:
      numerator:
        aggregate: count
        condition:
          column: payments.payment_status
          operator: "="
          value: SUCCESS
      denominator:
        aggregate: count
        grain: payments.payment_ref
        forbidden_base_filters:
        - column: payments.payment_status
          reason: PSR denominator is all payment attempts after user filters; do
            not filter payment_status in WHERE or base CTEs. Apply SUCCESS only
            inside numerator aggregates.
      time_column: payments.payment_time
  tables:
  - payments
  columns:
  - payments.payment_status
  - payments.payment_time
- id: dau
  name: DAU
  description: Distinct users with at least one successful payment on the calendar
    day.
  calculation: COUNT(DISTINCT user_ref) grouped by CAST(payment_time AS DATE)
  tables:
  - payments
  columns:
  - payments.user_ref
  - payments.payment_time
  - payments.payment_status
- id: mau
  name: MAU
  description: Distinct users with at least three successful payments in the calendar
    month.
  calculation: Count users whose successful payment count in a calendar month is at
    least 3.
  tables:
  - payments
  columns:
  - payments.user_ref
  - payments.payment_time
  - payments.payment_status
sql_templates:
- id: tpv_by_period_and_rail
  name: TPV by period and rail
  description: Use for total payment volume sliced by payment rail and time grain.
  required_tables:
  - payments
  - payment_attributes
  join_path:
  - - payments.rail_ref
    - payment_attributes.rail_ref
  sql: SELECT date_trunc('{{ grain }}', p.payment_time) AS period, pa.rail_type, SUM(p.amount)
    AS tpv FROM payments p JOIN payment_attributes pa ON p.rail_ref = pa.rail_ref
    WHERE p.payment_status = 'SUCCESS' AND p.payment_time >= {{ start_time }} AND
    p.payment_time < {{ end_time }} GROUP BY period, pa.rail_type ORDER BY period,
    pa.rail_type
- id: psr_by_period_and_rail
  name: PSR by period and rail
  description: Use for payment success rate sliced by UPI, CC, NEFT, IMPS, or other
    rails.
  required_tables:
  - payments
  - payment_attributes
  join_path:
  - - payments.rail_ref
    - payment_attributes.rail_ref
  sql: SELECT date_trunc('{{ grain }}', p.payment_time) AS period, pa.rail_type, SUM(CASE
    WHEN p.payment_status = 'SUCCESS' THEN 1 ELSE 0 END)::DOUBLE / COUNT(*) AS psr,
    SUM(CASE WHEN p.payment_status = 'SUCCESS' THEN 1 ELSE 0 END) AS successful_payments,
    COUNT(*) AS total_payments FROM payments p JOIN payment_attributes pa ON p.rail_ref
    = pa.rail_ref WHERE p.payment_time >= {{ start_time }} AND p.payment_time < {{
    end_time }} GROUP BY period, pa.rail_type ORDER BY period, pa.rail_type
- id: mau_calendar_month
  name: MAU calendar month
  description: Use for monthly active users with at least three successful payments
    in a calendar month.
  required_tables:
  - payments
  sql: WITH monthly_users AS (SELECT date_trunc('month', payment_time) AS month, user_ref,
    COUNT(*) AS successful_txns FROM payments WHERE payment_status = 'SUCCESS' GROUP
    BY month, user_ref) SELECT month, COUNT(*) AS mau FROM monthly_users WHERE successful_txns
    >= 3 GROUP BY month ORDER BY month
- id: retained_users_past_3_months
  name: Retained users past 3 months
  description: Use for users with at least 10 successful transactions in the last
    3 months and activity in every month.
  required_tables:
  - payments
  sql: WITH txns AS (SELECT user_ref, date_trunc('month', payment_time) AS month,
    COUNT(*) AS txns FROM payments WHERE payment_status = 'SUCCESS' AND payment_time
    >= {{ start_month }} AND payment_time < {{ end_month }} GROUP BY user_ref, month)
    SELECT COUNT(*) AS retained_users FROM (SELECT user_ref, SUM(txns) AS total_txns,
    COUNT(DISTINCT month) AS active_months FROM txns GROUP BY user_ref HAVING SUM(txns)
    >= 10 AND COUNT(DISTINCT month) = 3) retained
- id: churned_users_15_days
  name: Churned users past 15 days
  description: Use for users with prior successful payment activity but no successful
    payment in the last 15 days.
  required_tables:
  - payments
  sql: WITH prior_users AS (SELECT DISTINCT user_ref FROM payments WHERE payment_status
    = 'SUCCESS' AND payment_time < {{ anchor_time }} - INTERVAL 15 DAY), recent_users
    AS (SELECT DISTINCT user_ref FROM payments WHERE payment_status = 'SUCCESS' AND
    payment_time >= {{ anchor_time }} - INTERVAL 15 DAY) SELECT COUNT(*) AS churned_users
    FROM prior_users p LEFT JOIN recent_users r ON p.user_ref = r.user_ref WHERE r.user_ref
    IS NULL
ground_truth_sql: []
